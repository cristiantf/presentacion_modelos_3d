<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel de Administración</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <header>
        <div class="logo-container">
            <img src="assets/img/logo_ISATE.png" alt="Logo ISTAE">
            <h1>Administración 3D</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html">← Ir a Galería Pública</a>
        </nav>
    </header>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div class="admin-container" style="width: 100%; max-width: 400px;">
            <h2 class="section-title" style="font-size: 1.8rem;">Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar</button>
            </form>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
